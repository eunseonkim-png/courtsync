<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CourtSync</title>
  <meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CourtSync">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
 
</head>
<body>

  <header>💡 CourtSync - 다중 예약 추출</header>

  <div class="container">
    <div class="card">
      <h3 style="margin:0 0 6px 0;">1. 강동구 예약 내역 전체 붙여넣기</h3>
      <p style="font-size:13px; color:#666; margin:0 0 8px 0;">
        마이페이지 표 전체를 복사해서 아래에 그대로 붙여넣어 주세요.
      </p>
      <textarea id="rawText" placeholder="여기에 마이페이지에서 복사한 내역을 붙여넣으세요..."></textarea>
      <button onclick="parseMultiReservations()">여러 건 예약 한번에 추출하기</button>
    </div>

    <div id="resultSection" style="display:none;">
      <h3 style="margin: 16px 4px 8px 4px; font-size:1.1rem;">
        2. 추출된 예약 목록 (<span id="countText">0</span>건)
      </h3>
      
      <!-- 🚀 전체 한번에 등록하는 버튼 추가 -->
      <button class="btn-all" onclick="downloadAllICS()">
        📅 모든 예약 일시 한번에 캘린더 저장하기 (.ics)
      </button>

      <div id="reservationList"></div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
